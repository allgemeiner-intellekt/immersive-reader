<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg-d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg-d)"/>

  <!-- Book group: positioned lower-left, rotated ~12 degrees -->
  <g transform="translate(46, 78) rotate(-12)">
    <!-- Left page -->
    <path d="M-28 0 C-28 0 -24 -32 0 -34 L0 0 Z" fill="white" opacity="0.95"/>

    <!-- Right page (slightly curled) -->
    <path d="M28 0 C28 0 24 -32 0 -34 L0 0 Z" fill="white" opacity="0.95"/>
    <!-- Page curl on right page -->
    <path d="M28 0 C26 -4 22 -6 18 -4 L20 0 Z" fill="white" opacity="0.6"/>

    <!-- Spine highlights -->
    <path d="M0 -34 L0 0 L-3 0 C-3 0 -3 -30 0 -34 Z" fill="white" opacity="0.6"/>
    <path d="M0 -34 L0 0 L3 0 C3 0 3 -30 0 -34 Z" fill="white" opacity="0.6"/>
  </g>

  <!-- Sound wave arcs emanating toward upper-right -->
  <!-- Arcs centered around the book opening, angled diagonally -->
  <g transform="translate(50, 68) rotate(-40)">
    <path d="M-8 0 C-4 -10 4 -10 8 0" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
    <path d="M-14 0 C-7 -18 7 -18 14 0" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M-20 0 C-10 -26 10 -26 20 0" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  </g>
</svg>
