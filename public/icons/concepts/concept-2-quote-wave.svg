<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Concept 2: Large quotation mark morphing into a sound wave -->
  <defs>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#4834D4"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#g2)"/>
  <!-- Large opening quote mark -->
  <circle cx="42" cy="50" r="12" fill="white" opacity="0.95"/>
  <path d="M42 62 Q38 78 28 82" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.95"/>
  <!-- Sound wave lines extending from the quote -->
  <line x1="66" y1="44" x2="92" y2="44" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <line x1="66" y1="56" x2="84" y2="56" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="66" y1="68" x2="88" y2="68" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
</svg>
