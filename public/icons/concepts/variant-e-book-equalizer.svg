<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Open book (V-shape) -->
  <g stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left page -->
    <path d="M64 82 L30 72 L30 90 L64 98" opacity="0.95"/>
    <!-- Right page -->
    <path d="M64 82 L98 72 L98 90 L64 98" opacity="0.95"/>
    <!-- Spine -->
    <line x1="64" y1="82" x2="64" y2="98" opacity="0.95"/>
    <!-- Page lines left -->
    <line x1="38" y1="78" x2="56" y2="84" opacity="0.3" stroke-width="2"/>
    <line x1="38" y1="83" x2="56" y2="88" opacity="0.3" stroke-width="2"/>
    <!-- Page lines right -->
    <line x1="90" y1="78" x2="72" y2="84" opacity="0.3" stroke-width="2"/>
    <line x1="90" y1="83" x2="72" y2="88" opacity="0.3" stroke-width="2"/>
  </g>

  <!-- Equalizer bars -->
  <g fill="#FFFFFF">
    <rect x="36" y="46" width="6" height="28" rx="3" opacity="0.45"/>
    <rect x="46" y="34" width="6" height="40" rx="3" opacity="0.6"/>
    <rect x="56" y="24" width="6" height="50" rx="3" opacity="0.85"/>
    <rect x="66" y="18" width="6" height="56" rx="3" opacity="1.0"/>
    <rect x="76" y="28" width="6" height="46" rx="3" opacity="0.75"/>
    <rect x="86" y="40" width="6" height="34" rx="3" opacity="0.5"/>
  </g>
</svg>
