<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2C3E8C"/>
      <stop offset="100%" stop-color="#4F7CFF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Open book: V-shape with page lines -->
  <g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left cover -->
    <path d="M34 88 L64 78 L64 58" stroke-width="2.5"/>
    <!-- Right cover -->
    <path d="M94 88 L64 78 L64 58" stroke-width="2.5"/>
    <!-- Left page lines -->
    <line x1="42" y1="82" x2="60" y2="75" stroke-width="2" opacity="0.6"/>
    <line x1="46" y1="76" x2="60" y2="70" stroke-width="2" opacity="0.4"/>
    <!-- Right page lines -->
    <line x1="86" y1="82" x2="68" y2="75" stroke-width="2" opacity="0.6"/>
    <line x1="82" y1="76" x2="68" y2="70" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- Sound waves: 3 concentric arcs above book center -->
  <g fill="none" stroke="#fff" stroke-linecap="round">
    <path d="M56 50 A12 12 0 0 1 72 50" stroke-width="2.5" opacity="0.9"/>
    <path d="M50 44 A20 20 0 0 1 78 44" stroke-width="2.5" opacity="0.55"/>
    <path d="M44 38 A28 28 0 0 1 84 38" stroke-width="2.5" opacity="0.25"/>
  </g>
</svg>
